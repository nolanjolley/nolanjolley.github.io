<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Nolan Jolley{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Rubik' rel='stylesheet'>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>
    <header>
        <div class="header-row">
            <h1>Nolan Jolley</h1>
            <nav>
                <div class="nav-links" id="navLinks">
                    <ul>
                        <li><a href="/about"> About </a></li>
                        <li><a href="/">Experience</a></li>
                        <li><a href="/projects"> Projects </a></li>
                        <li><a href="/contact"> Contact </a></li>
                        <li><a href="static/images/nolanjolley2025-12.pdf" target=blank_> Resume </a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>
    <main>
        {% block maincontent %}{% endblock %}
    </main>
    <footer>
        <div class="footer-row">
            <div class="icons">
                <i class="fa fa-github" onclick="window.location.href = 'https://github.com/nolanjolley';"></i>
                <i class="fa fa-linkedin-square"
                    onclick="window.location.href = 'https://www.linkedin.com/in/nolan-jolley-66517a282/';"></i>
            </div>
        </div>
    </footer>
</body>
</html>
